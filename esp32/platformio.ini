[env:esp32-c3-devkitm-1]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

; USB CDC Serial (built-in USB on ESP32-C3)
board_build.usb_mode = 1          ; CDC/JTAG
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_NIMBLE

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    ; NimBLE-Arduino: lightweight BLE stack for ESP32
    h2zero/NimBLE-Arduino @ ^1.4.2
    ; ESP32-BLE-Combo: BLE HID keyboard+mouse combo profile (NimBLE variant)
    https://github.com/Georgegipa/ESP32-BLE-Combo.git
